<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winsestar | Imperial Databank</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Essential Sovereign CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
      .sovereign-master {
        background: #000;
        position: relative;
      }
      #mainUI {
        z-index: 10;
      }
      .info-box-v7 {
        width: 100%;
        max-width: 600px;
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(15px);
        border: 2px solid #facc15;
        box-shadow: 0 0 35px rgba(250,204,21,0.2) inset, 0 0 45px rgba(0,0,0,0.9);
        border-radius: 40px;
        padding: 4rem 3rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      .data-row {
        width: 100%;
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
        border-bottom: 1px dotted rgba(250,204,21,0.2);
        padding-bottom: 0.5rem;
      }
      .d-label {
        color: rgba(255,255,255,0.6);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .d-val {
        color: #fff;
        font-family: 'Poppins', sans-serif;
        font-weight: 500;
        text-align: right;
      }
      .return-btn {
        margin-top: 3rem;
        padding: 12px 40px;
        background: transparent;
        border: 1px solid #facc15;
        color: #facc15;
        border-radius: 30px;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
        letter-spacing: 2px;
        transition: all 0.3s ease;
        text-decoration: none;
        box-shadow: 0 0 15px rgba(250,204,21,0.2) inset;
      }
      .return-btn:hover {
        background: #facc15;
        color: #000;
        box-shadow: 0 0 25px rgba(250,204,21,0.6);
      }
      h1 {
        color: #facc15;
        font-family: 'Montserrat', sans-serif;
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 4px;
        margin-bottom: 2rem;
        text-shadow: 0 0 20px rgba(250,204,21,0.5);
      }
    </style>
</head>
<body>

<div class="sovereign-master h-screen w-full overflow-hidden flex items-center justify-center bg-black">
    <!-- 3D ZOOMING STARS BG -->
    <canvas id="warpCanvas" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:0;"></canvas>

    <!-- MAIN INTERFACE -->
    <div id="mainUI" class="main-container-v7 main-visible">
      <div class="tilt-wrapper" style="width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: center; position: relative;">
        
        <div class="info-box-v7">
          <h1><i class="fa-solid fa-server" style="margin-right: 12px;"></i>DATABANK</h1>
          
          <div class="data-row">
            <span class="d-label">Designation</span>
            <span class="d-val">WINSESTAR</span>
          </div>
          <div class="data-row">
            <span class="d-label">Core Engine</span>
            <span class="d-val">Sovereign V8.5 Static</span>
          </div>
          <div class="data-row">
            <span class="d-label">Telemetry Provider</span>
            <span class="d-val">Lanyard REST/WSS</span>
          </div>
          <div class="data-row">
            <span class="d-label">Deployment</span>
            <span class="d-val">Cloudflare Pages Global</span>
          </div>
          <div class="data-row">
            <span class="d-label">Security</span>
            <span class="d-val" style="color: #22c55e;"><i class="fa-solid fa-shield-check"></i> Maximum</span>
          </div>
          <div class="data-row" style="border:none;">
            <span class="d-label">System Status</span>
            <span class="d-val" style="color: #facc15;">ONLINE & SYNCED</span>
          </div>

          <a href="/" class="return-btn"><i class="fa-solid fa-angle-left" style="margin-right: 8px;"></i> RETURN TO MAIN UI</a>
        </div>
      </div>
    </div>
</div>

<script>
  // Warp Speed Yellow Stars
  const canvas = document.getElementById('warpCanvas');
  const ctx = canvas.getContext('2d');
  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;
  let stars = [];
  for(let i=0; i<300; i++) {
    stars.push({ x: Math.random()*w-w/2, y: Math.random()*h-h/2, z: Math.random()*w });
  }
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0,0,w,h);
    ctx.translate(w/2, h/2);
    for(let i=0; i<stars.length; i++) {
      let s = stars[i];
      s.z -= 3;
      if (s.z <= 0) { s.z = w; s.x = Math.random()*w-w/2; s.y = Math.random()*h-h/2; }
      let x = (s.x / s.z) * w, y = (s.y / s.z) * h, r = 1.2 * (w / s.z);
      if(r>10) r=10;
      ctx.beginPath();
      ctx.fillStyle = '#facc15';
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.translate(-w/2, -h/2);
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

  // Cursor Glow
  const cg = document.createElement('div');
  cg.style.cssText = 'position:fixed; width:200px; height:200px; background:radial-gradient(circle, rgba(250,204,21,0.2) 0%, transparent 70%); border-radius:50%; pointer-events:none; z-index:9999; mix-blend-mode:screen; transform:translate(-50%,-50%); left:-500px; top:-500px;';
  document.body.appendChild(cg);
  document.addEventListener('mousemove', e => {
     cg.style.left = e.clientX + 'px';
     cg.style.top = e.clientY + 'px';
  });
</script>

</body>
</html>
