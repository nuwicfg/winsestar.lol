<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winsestar | Kimdir?</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #050505;
        color: #ffffff;
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
      }
      
      /* Floating Nav */
      .top-nav {
        position: fixed;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        background: rgba(20, 20, 20, 0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 50px;
        padding: 5px;
        z-index: 100;
      }
      .nav-item {
        padding: 10px 25px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: 50px;
        text-decoration: none;
        transition: all 0.3s ease;
      }
      .nav-item:hover {
        color: #fff;
      }
      .nav-item.active {
        background: #ffffff;
        color: #000000;
      }
      
      /* Right actions */
      .action-btns {
        position: fixed;
        top: 40px;
        right: 40px;
        display: flex;
        gap: 15px;
        z-index: 100;
      }
      .action-btn {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: rgba(20, 20, 20, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        cursor: pointer;
        transition: all 0.3s;
      }
      .action-btn:hover {
        background: rgba(40, 40, 40, 0.8);
      }

      /* Main Content Layout */
      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
      }
      .hero-grid {
        display: flex;
        align-items: center;
        gap: 80px;
        max-width: 1100px;
        width: 100%;
      }
      
      /* Image Card - 3D */
      .image-card {
        background: rgba(17, 17, 17, 0.4);
        border-radius: 40px;
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 100px rgba(250,204,21,0.05);
        position: relative;
        transform-style: preserve-3d;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .image-card::after {
          content: "";
          position: absolute;
          top: 50%; left: 50%;
          transform: translate(-50%, -50%) translateZ(-50px);
          width: 150%; height: 150%;
          background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 60%);
          z-index: -1;
          pointer-events: none;
      }
      .profile-img {
        width: 320px;
        height: 320px;
        object-fit: contain; /* Perfect for transparent TikTok profile png */
        border-radius: 30px;
        transform: translateZ(50px); /* 3D POP EFFECT */
        transition: transform 0.3s ease;
      }
      
      /* Typography */
      .text-content {
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .title-line-1 {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 3.5rem;
        line-height: 1;
        color: #e0e0e0;
        letter-spacing: -1px;
      }
      .title-line-2 {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 6rem;
        line-height: 0.9;
        color: #ffffff;
        letter-spacing: -3px;
        margin-bottom: 25px;
      }
      .desc-text {
        color: #888888;
        font-size: 1.1rem;
        line-height: 1.6;
        max-width: 500px;
        font-weight: 400;
        min-height: 80px; /* Space for typewriter */
      }
      
      /* New Social Links Grid */
      .social-media-area {
        margin-top: 30px;
        display: flex;
        gap: 15px;
      }
      .soc-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 45px;
        height: 45px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: #fff;
        text-decoration: none;
        font-size: 1.2rem;
        transition: all 0.3s ease;
      }
      .soc-btn:hover {
        background: #fff;
        color: #000;
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(255,255,255,0.1);
      }

      /* Footer Nav */
      .footer-nav {
        position: fixed;
        bottom: 40px;
        right: 40px;
        display: flex;
        gap: 30px;
        z-index: 100;
      }
      .f-link {
        color: rgba(255,255,255,0.3);
        text-decoration: none;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        transition: color 0.3s;
      }
      .f-link:hover {
        color: #fff;
      }

      /* Responsive */
      @media (max-width: 900px) {
        .hero-grid {
          flex-direction: column;
          text-align: center;
          gap: 40px;
          margin-top: 50px;
        }
        .title-line-1 { font-size: 2.5rem; }
        .title-line-2 { font-size: 4rem; }
        .footer-nav {
          position: relative;
          bottom: 0; right: 0;
          justify-content: center;
          margin-top: 50px;
          width: 100%;
        }
        .action-btns { display: none; }
        .social-media-area { justify-content: center; }
      }
    </style>
</head>
<body>

    <!-- TOP NAVIGATION -->
    <nav class="top-nav">
        <a href="index.html" class="nav-item">ANA SAYFA</a>
        <a href="#" class="nav-item active">WİNSESTAR</a>
        <a href="#" class="nav-item">SOSYAL MEDYA</a>
    </nav>

    <!-- RIGHT ACTION BUTTONS -->
    <div class="action-btns">
        <button class="action-btn"><i class="fa-solid fa-moon"></i></button>
        <button class="action-btn" style="font-size: 0.8rem; font-weight:bold; font-family:'Montserrat', sans-serif;">TR</button>
    </div>

    <!-- MAIN HERO SECTION -->
    <section class="hero-section">
        <div class="hero-grid">
            
            <!-- LEFT IMAGE CARD (3D TILT ENABLED) -->
            <!-- Upload your tiktok logo file as 'tiktok.png' with a transparent background! -->
            <div class="image-card" data-tilt data-tilt-max="20" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.5">
                <img src="tiktok.png" alt="Tiktok Profil" class="profile-img" onerror="this.src='profil.gif'">
            </div>

            <!-- RIGHT TEXT CONTENT -->
            <div class="text-content">
                <div class="title-line-1">WİNSESTAR</div>
                <div class="title-line-2">KİMDİR?</div>
                <p class="desc-text" id="typewriterText"></p>
                
                <div class="social-media-area">
                  <a href="https://tiktok.com/@winsestar" target="_blank" class="soc-btn"><i class="fa-brands fa-tiktok"></i></a>
                  <a href="https://discord.com/users/1158363483256147978" target="_blank" class="soc-btn"><i class="fa-brands fa-discord"></i></a>
                  <a href="https://instagram.com/winsestar" target="_blank" class="soc-btn"><i class="fa-brands fa-instagram"></i></a>
                  <a href="https://youtube.com/@winsestar" target="_blank" class="soc-btn"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer Links -->
    <div class="footer-nav">
        <a href="https://tiktok.com/@winsestar" target="_blank" class="f-link">TİKTOK</a>
        <a href="https://discord.com/users/1158363483256147978" target="_blank" class="f-link">DİSCORD</a>
        <a href="https://instagram.com/winsestar" target="_blank" class="f-link">INSTAGRAM</a>
    </div>

    <!-- VanillaTilt Library for 3D Effect -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        // Typewriter Effect
        document.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('typewriterText');
            // Your custom text about TikTok edits:
            const text = "Merhaba, ben Winsestar. Klasik kurguları yıkan dinamik bir TikTok editörüyüm. Ritim ve görselliğin buluştuğu o karanlık tarafta, en akıcı videoları ben inşa ederim.";
            let i = 0;
            
            function typeWriter() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 35); // Lower number = faster typing
                }
            }
            
            // Start typewriter after a short delay
            setTimeout(typeWriter, 500);
        });
    </script>
</body>
</html>
