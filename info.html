<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winsestar | Kimdir?</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #050505;
        color: #ffffff;
        font-family: 'Poppins', sans-serif;
        overflow-x: hidden;
        /* Default opacity for smooth fade in */
        opacity: 0;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      /* Valorant Background Layer */
      .bg-valorant {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background: url('https://media.valorant-api.com/agents/8e253930-4c05-31dd-1b6c-968525494517/background.png') no-repeat center center;
          background-size: cover;
          opacity: 0.15;
          z-index: -2;
          pointer-events: none;
      }

      /* Floating Nav */
      .top-nav {
        position: fixed;
        top: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        background: rgba(20, 20, 20, 0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 50px;
        padding: 5px;
        z-index: 100;
      }
      .nav-item {
        padding: 10px 25px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: 50px;
        text-decoration: none;
        transition: all 0.3s ease;
      }
      .nav-item:hover {
        color: #fff;
      }
      .nav-item.active {
        background: #ffffff;
        color: #000000;
      }
      
      /* Right actions */
      .action-btns {
        position: fixed;
        top: 40px;
        right: 40px;
        display: flex;
        gap: 15px;
        z-index: 100;
      }
      .action-btn {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: rgba(20, 20, 20, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        cursor: pointer;
        transition: all 0.3s;
      }
      .action-btn:hover {
        background: rgba(40, 40, 40, 0.8);
      }

      /* Main Content Layout */
      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
      }
      .hero-grid {
        display: flex;
        align-items: center;
        gap: 80px;
        max-width: 1100px;
        width: 100%;
      }
      
      /* Image Card - 3D */
      .image-card {
        background: rgba(17, 17, 17, 0.6);
        border-radius: 40px;
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 100px rgba(255,255,255,0.05);
        position: relative;
        transform-style: preserve-3d;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        cursor: pointer;
      }
      .image-card::after {
          content: "";
          position: absolute;
          top: 50%; left: 50%;
          transform: translate(-50%, -50%) translateZ(-50px);
          width: 150%; height: 150%;
          background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 60%);
          z-index: -1;
          pointer-events: none;
      }
      
      /* Use absolute positioning to layer default avatar + Tiktok Overlay */
      .profile-img {
        width: 320px;
        height: 320px;
        object-fit: cover;
        border-radius: 40px;
        transform: translateZ(30px);
        transition: transform 0.3s ease;
      }
      .tiktok-overlay {
          position: absolute;
          bottom: 20px;
          right: 20px;
          font-size: 3rem;
          color: #fff;
          text-shadow: 2px 2px 0 #ff0050, -2px -2px 0 #00f2fe;
          transform: translateZ(80px); /* Pops out a LOT */
      }

      /* Typography */
      .text-content {
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .title-line-1 {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 3.5rem;
        line-height: 1;
        color: #e0e0e0;
        letter-spacing: -1px;
      }
      .title-line-2 {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 6rem;
        line-height: 0.9;
        color: #ffffff;
        letter-spacing: -3px;
        margin-bottom: 25px;
      }
      .desc-text {
        color: #888888;
        font-size: 1.1rem;
        line-height: 1.6;
        max-width: 500px;
        font-weight: 400;
        min-height: 80px;
      }
      
      /* Advanced Social Media App Cards */
      .app-grid {
        margin-top: 40px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        max-width: 500px;
      }
      .app-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 15px 20px;
        display: flex;
        align-items: center;
        text-decoration: none;
        color: #fff;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .app-card:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 40px rgba(255,255,255,0.05);
      }
      .app-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        margin-right: 15px;
      }
      .app-name {
        font-weight: 600;
        letter-spacing: 1px;
        font-family: 'Poppins', sans-serif;
      }

      /* Footer Nav */
      .footer-nav {
        position: fixed;
        bottom: 40px;
        right: 40px;
        display: flex;
        gap: 30px;
        z-index: 100;
      }
      .f-link {
        color: rgba(255,255,255,0.3);
        text-decoration: none;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 3px;
        text-transform: uppercase;
        transition: color 0.3s;
      }
      .f-link:hover {
        color: #fff;
      }

      @media (max-width: 900px) {
        .hero-grid { flex-direction: column; text-align: center; gap: 40px; margin-top: 50px; }
        .title-line-1 { font-size: 2.5rem; }
        .title-line-2 { font-size: 4rem; }
        .footer-nav { position: relative; bottom: 0; right: 0; justify-content: center; margin-top: 50px; width: 100%; }
        .action-btns { display: none; }
        .social-media-area { justify-content: center; }
      }
    </style>
</head>
<body>

    <div class="bg-valorant"></div>

    <!-- 3D ZOOMING & SHOOTING STARS BG -->
    <canvas id="warpCanvas" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:-1;"></canvas>

    <!-- TOP NAVIGATION -->
    <nav class="top-nav">
        <!-- Intercepted by JS below for page transition -->
        <a href="index.html" class="nav-item page-link">ANA SAYFA</a>
        <a href="#" class="nav-item active">WİNSESTAR</a>
        <a href="#" class="nav-item">SOSYAL MEDYA</a>
    </nav>

    <!-- RIGHT ACTION BUTTONS -->
    <div class="action-btns">
        <button class="action-btn"><i class="fa-solid fa-moon"></i></button>
        <button class="action-btn" style="font-size: 0.8rem; font-weight:bold; font-family:'Montserrat', sans-serif;">TR</button>
    </div>

    <!-- MAIN HERO SECTION -->
    <section class="hero-section">
        <div class="hero-grid">
            
            <!-- LEFT IMAGE CARD (3D TILT ENABLED) -->
            
            <div class="image-card" data-tilt data-tilt-max="20" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.3">
                <img src="profil.gif" alt="Profil" class="profile-img">
            </div>


            <!-- RIGHT TEXT CONTENT -->
            <div class="text-content">
                <div class="title-line-1">WİNSESTAR</div>
                <div class="title-line-2">KİMDİR?</div>
                <p class="desc-text" id="typewriterText"></p>
                
                <div class="app-grid">
                  <a href="https://tiktok.com/@winsevlr" target="_blank" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(45deg, #00f2fe, #ff0050);"><i class="fa-brands fa-tiktok"></i></div>
                    <div class="app-name">TikTok</div>

                  <a href="https://discord.com/users/1158363483256147978" target="_blank" class="app-card">
                    <div class="app-icon" style="background: #5865F2;"><i class="fa-brands fa-discord"></i></div>
                    <div class="app-name">Discord</div>

                  <a href="https://instagram.com/winsestar" target="_blank" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);"><i class="fa-brands fa-instagram"></i></div>
                    <div class="app-name">Instagram</div>

                  <a href="https://youtube.com/@winsestar" target="_blank" class="app-card">
                    <div class="app-icon" style="background: #FF0000;"><i class="fa-brands fa-youtube"></i></div>
                    <div class="app-name">YouTube</div>

                </div>
            </div>

        </div>
    </section>

    <!-- VanillaTilt Library for 3D Effect -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        // Smooth Entry & Exit Transitions
        document.addEventListener('DOMContentLoaded', () => {
            // Fade in
            setTimeout(() => { document.body.style.opacity = '1'; }, 100);
            
            // Intercept links for fade out
            const pageLinks = document.querySelectorAll('.page-link');
            pageLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = e.currentTarget.href;
                    document.body.style.opacity = '0';
                    document.body.style.transform = 'scale(0.97)';
                    setTimeout(() => { window.location.href = target; }, 500);
                });
            });
        });

        // Typewriter Effect
        document.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('typewriterText');
            // Epic biography prioritizing Valorant and Tiktok Edits
            const text = "Merhaba, ben Winsestar. Profesyonel TikTok editörüyüm. Ritim ve görselliğin iç içe girdiği Vandal vuruşları, nefes kesen Valorant fragmanları ve akıcı montajlarla dijital dünyaya yön veriyorum.";
            let i = 0;
            
            function typeWriter() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 40);
                }
            }
            setTimeout(typeWriter, 600);
        });

        // Advanced WebGL style Warp & Shooting Stars Canvas
        const canvas = document.getElementById('warpCanvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        
        // Warp Stars
        let stars = [];
        for(let i=0; i<400; i++) {
          stars.push({ x: Math.random()*w-w/2, y: Math.random()*h-h/2, z: Math.random()*w });
        }
        
        // Fast Shooting Stars (Meteors)
        let meteors = [];
        function spawnMeteor() {
            if (Math.random() > 0.95) { // 5% chance per frame
                meteors.push({
                    x: Math.random() * w,
                    y: -50,
                    length: Math.random() * 100 + 100,
                    speedX: (Math.random() - 0.5) * 5,
                    speedY: Math.random() * 20 + 20,
                    opacity: 1
                });
            }
        }

        function draw() {
          ctx.fillStyle = 'rgba(0,0,0,0.3)';
          ctx.fillRect(0,0,w,h);
          
          ctx.translate(w/2, h/2);
          for(let i=0; i<stars.length; i++) {
            let s = stars[i];
            s.z -= 4; // Faster warp
            if (s.z <= 0) { s.z = w; s.x = Math.random()*w-w/2; s.y = Math.random()*h-h/2; }
            let x = (s.x / s.z) * w, y = (s.y / s.z) * h, r = 1.2 * (w / s.z);
            if(r>10) r=10;
            ctx.beginPath();
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.translate(-w/2, -h/2);

          // Render Meteors
          spawnMeteor();
          for(let i=meteors.length-1; i>=0; i--) {
              let m = meteors[i];
              m.x += m.speedX;
              m.y += m.speedY;
              m.opacity -= 0.015;
              
              if (m.opacity <= 0) {
                  meteors.splice(i, 1);
                  continue;
              }
              
              ctx.beginPath();
              // Create glowing trail line
              const gradient = ctx.createLinearGradient(m.x, m.y, m.x - m.speedX*3, m.y - m.speedY*3);
              gradient.addColorStop(0, `rgba(255, 255, 255, ${m.opacity})`);
              gradient.addColorStop(1, 'rgba(0, 242, 254, 0)'); // Very faint cyan tail
              ctx.strokeStyle = gradient;
              ctx.lineWidth = 3;
              ctx.moveTo(m.x, m.y);
              ctx.lineTo(m.x - (m.speedX * Math.random() * 5), m.y - (m.length));
              ctx.stroke();
          }
          requestAnimationFrame(draw);
        }
        draw();
        window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

        // Cursor Glow
        const cg = document.createElement('div');
        cg.style.cssText = 'position:fixed; width:200px; height:200px; background:radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%); border-radius:50%; pointer-events:none; z-index:9999; mix-blend-mode:screen; transform:translate(-50%,-50%); left:-500px; top:-500px;';
        document.body.appendChild(cg);
        document.addEventListener('mousemove', e => {
           cg.style.left = e.clientX + 'px';
           cg.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
