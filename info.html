<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winsestar | Kimdir?</title>
  <link rel="icon" type="image/png" href="logo.png?v=2">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #050505;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      /* Default opacity for smooth fade in */
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Valorant Background Layer */
    .bg-valorant {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://media.valorant-api.com/agents/8e253930-4c05-31dd-1b6c-968525494517/background.png') no-repeat center center;
      background-size: cover;
      opacity: 0.15;
      z-index: -2;
      pointer-events: none;
    }



      /* Side Nav Capsule (Modern Left Sidebar) */
      .side-nav {
        position: fixed;
        left: 40px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        background: rgba(15, 15, 15, 0.4);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 40px;
        padding: 12px;
        z-index: 1000;
        gap: 15px;
        box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05);
      }
      .nav-item {
        width: 54px;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.3);
        font-size: 1.2rem;
        border-radius: 50%;
        text-decoration: none;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
      }
      .nav-item:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.05);
      }
      .nav-item.active {
        background: #ffffff;
        color: #000000;
        box-shadow: 0 0 25px rgba(255,255,255,0.3);
        transform: scale(1.1);
      }
      .nav-label {
        position: absolute;
        left: 75px;
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        padding: 6px 15px;
        border-radius: 8px;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 2px;
        color: #fff;
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
        white-space: nowrap;
        border: 1px solid rgba(255,255,255,0.1);
      }
      .nav-item:hover .nav-label {
        opacity: 1;
        left: 85px;
      }

    /* Right actions */
    .action-btns {
      position: fixed;
      top: 40px;
      right: 40px;
      display: flex;
      gap: 15px;
      z-index: 100;
    }

    .action-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(20, 20, 20, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
    }

    .action-btn:hover {
      background: rgba(40, 40, 40, 0.8);
    }

    /* Language Toggle */
    .lang-switch {
      display: flex;
      align-items: center;
      background: rgba(20, 20, 20, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 30px;
      padding: 4px;
      gap: 5px;
    }

    .lang-btn {
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-btn.active {
      background: rgba(255, 255, 255, 0.1);
      font-weight: 700;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }

    /* Left Side Nav */
    .left-side-nav {
      position: fixed;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .side-nav-item {
      width: 12px;
      height: 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.4s;
      position: relative;
    }

    .side-nav-item:hover,
    .side-nav-item.active {
      background: #fff;
      box-shadow: 0 0 15px #fff;
      transform: scale(1.4);
    }

    .side-nav-item::before {
      content: attr(data-label);
      position: absolute;
      left: 25px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .side-nav-item:hover::before {
      opacity: 1;
      left: 35px;
    }

    /* Main Content Layout */
    .hero-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    .hero-grid {
      display: flex;
      align-items: center;
      gap: 80px;
      max-width: 1100px;
      width: 100%;
    }

    /* Image Card - 3D */
    .image-card {
      background: rgba(17, 17, 17, 0.6);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 100px rgba(255, 255, 255, 0.05);
      position: relative;
      transform-style: preserve-3d;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
    }

    .image-card::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(-50px);
      width: 150%;
      height: 150%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.04) 0%, transparent 60%);
      z-index: -1;
      pointer-events: none;
    }

    /* Use absolute positioning to layer default avatar + Tiktok Overlay */
    .profile-img {
      width: 320px;
      height: 320px;
      object-fit: cover;
      border-radius: 40px;
      transform: translateZ(30px);
      transition: transform 0.3s ease;
    }

    .tiktok-overlay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 3rem;
      color: #fff;
      text-shadow: 2px 2px 0 #ff0050, -2px -2px 0 #00f2fe;
      transform: translateZ(80px);
      /* Pops out a LOT */
    }

    /* Typography */
    .text-content {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .title-line-1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 3.5rem;
      line-height: 1;
      background: linear-gradient(to right, #ffffff, #666666);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1px;
    }

    .title-line-2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 6rem;
      line-height: 0.9;
      color: #ffffff;
      letter-spacing: -3px;
      margin-bottom: 25px;
    }

    .desc-text {
      color: #888888;
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 500px;
      font-weight: 400;
      min-height: 80px;
    }

    .app-icon {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #fff;
    }

    .app-name {
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 1px;
      font-family: 'Montserrat', sans-serif;
    }

    /* Footer Nav */
    .footer-nav {
      position: fixed;
      bottom: 40px;
      right: 40px;
      display: flex;
      gap: 30px;
      z-index: 100;
    }

    .f-link {
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .f-link:hover {
      color: #fff;
    }

    @media (max-width: 900px) {
      .hero-grid {
        flex-direction: column;
        text-align: center;
        gap: 40px;
        margin-top: 50px;
      }

      .title-line-1 {
        font-size: 2.5rem;
      }

      .title-line-2 {
        font-size: 4rem;
      }

      .footer-nav {
        position: relative;
        bottom: 0;
        right: 0;
        justify-content: center;
        margin-top: 50px;
        width: 100%;
      }

      .action-btns {
        top: 15px;
        right: 15px;
        transform: scale(0.8);
        transform-origin: top right;
      }

      .social-media-area {
        justify-content: center;
      }
    }

    @media (max-width: 768px) {
      .action-btns {
        top: 25px !important;
        right: 50% !important;
        transform: translateX(50%) scale(0.9) !important;
        width: max-content;
      }
      
      .side-nav {
        left: 50% !important;
        top: auto !important;
        bottom: 25px !important;
        transform: translateX(-50%) !important;
        flex-direction: row !important;
        padding: 12px 25px !important;
        border-radius: 40px !important;
        width: auto !important;
        background: rgba(10, 10, 10, 0.8) !important;
        backdrop-filter: blur(20px) !important;
      }
      
      .nav-item {
        width: 50px !important;
        height: 50px !important;
        font-size: 1.2rem !important;
      }
      
      .hero-grid {
        gap: 40px;
        margin-top: 60px;
        padding-bottom: 120px;
      }
      
      .profile-img {
        width: 260px;
        height: 260px;
        border-radius: 35px;
      }
      
      .title-line-1 { font-size: 2.22rem !important; }
      .title-line-2 { font-size: 3.5rem !important; margin-bottom: 20px; }
      .desc-text { font-size: 1rem; line-height: 1.7; padding: 0 15px; }
    }
  </style>
</head>

<body>

  <div class="bg-valorant"></div>

  <!-- 3D ZOOMING & SHOOTING STARS BG -->
  <canvas id="warpCanvas" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:-1;"></canvas>

  <!-- SIDE NAVIGATION (Iconic Capsule) -->
  <nav class="side-nav">

    <a href="index.html" class="nav-item page-link">
        <i class="fa-solid fa-house"></i>
        <span class="nav-label">ANA SAYFA</span>
    </a>
    <a href="info.html" class="nav-item active page-link">
        <i class="fa-solid fa-user"></i>
        <span class="nav-label">WİNSESTAR</span>
    </a>
    <a href="social.html" class="nav-item page-link">
      <i class="fa-solid fa-share-nodes"></i>
      <span class="nav-label">SOSYAL MEDYA</span>
    </a>
    <a href="portfolio.html" class="nav-item page-link">
      <i class="fa-solid fa-clapperboard"></i>
      <span class="nav-label">EDİTLERİM</span>
    </a>
  </nav>

  <div class="action-btns">
    <div class="lang-switch">
      <div id="lngTR" class="lang-btn active" onclick="switchLang('tr')">
        <img src="https://flagcdn.com/w20/tr.png" width="16" alt="TR"> TR
      </div>
      <div id="lngEN" class="lang-btn" onclick="switchLang('en')">
        <img src="https://flagcdn.com/w20/us.png" width="16" alt="EN"> EN
      </div>
      <div id="lngDE" class="lang-btn" onclick="switchLang('de')">
        <img src="https://flagcdn.com/w20/de.png" width="16" alt="DE"> DE
      </div>
      <div id="lngFR" class="lang-btn" onclick="switchLang('fr')">
        <img src="https://flagcdn.com/w20/fr.png" width="16" alt="FR"> FR
      </div>
    </div>
    <div class="action-btn" id="fsToggleBtnInfo"><i class="fa-solid fa-expand"></i></div>
  </div>

  <!-- MAIN HERO SECTION -->
  <section class="hero-section">
    <div class="hero-grid">

      <!-- LEFT IMAGE CARD (3D TILT ENABLED) -->

      <div class="image-card" data-tilt data-tilt-max="20" data-tilt-speed="400" data-tilt-glare="true"
        data-tilt-max-glare="0.3">
        <img src="profil.gif" alt="Profil" class="profile-img">
      </div>


      <!-- RIGHT TEXT CONTENT -->
      <div class="text-content">
        <div class="title-line-1" id="tr-title1">WİNSESTAR</div>
        <div class="title-line-2" id="tr-title2">KİMDİR?</div>
        <p class="desc-text" id="typewriterText"></p>
      </div>

    </div>
  </section>

  <!-- VanillaTilt Library for 3D Effect -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
  <script>
    // Fullscreen Logic for info page
    document.addEventListener('DOMContentLoaded', () => {
      const fsBtn = document.getElementById('fsToggleBtnInfo');
      if (fsBtn) {
        fsBtn.addEventListener('click', () => {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
            fsBtn.querySelector('i').classList.replace('fa-expand', 'fa-compress');
          } else {
            if (document.exitFullscreen) {
              document.exitFullscreen();
              fsBtn.querySelector('i').classList.replace('fa-compress', 'fa-expand');
            }
          }
        });
      }
    });

    // Translation Logic
    const TRANSLATIONS = {
      tr: {
        title1: "WİNSESTAR",
        title2: "KİMDİR?",
        navHome: "ANA SAYFA",
        navInfo: "WİNSESTAR",
        navSocial: "SOSYAL MEDYA",
        bio: "Merhaba, ben Winse (winsestar). TikTok ve Instagram platformları için profesyonel Valorant içerikleri üretiyorum. Çalışmalarım ve sosyal medya hesaplarım hakkında daha fazla bilgiye ulaşmak isterseniz, soldaki menüden 'Sosyal Medya' sekmesine göz atabilirsiniz."
      },
      en: {
        title1: "WİNSESTAR",
        title2: "WHO IS?",
        navHome: "HOME",
        navInfo: "ABOUT",
        navSocial: "SOCIALS",
        bio: "Hello, I am Winse (winsestar). I create professional Valorant content for TikTok and Instagram platforms. If you want to access more information about my work and social media accounts, you can check out the 'Socials' tab from the menu on the left."
      },
      de: {
        title1: "WİNSESTAR",
        title2: "WER IST?",
        navHome: "START",
        navInfo: "ÜBER",
        navSocial: "SOZIALES",
        bio: "Hallo, ich bin Winse (winsestar). Ich erstelle professionelle Valorant-Inhalte für die Plattformen TikTok und Instagram. Wenn Sie weitere Informationen über meine Arbeit und meine Social-Media-Konten erhalten möchten, können Sie im linken Menü den Tab 'Soziales' besuchen."
      },
      fr: {
        title1: "WİNSESTAR",
        title2: "QUI EST?",
        navHome: "ACCUEIL",
        navInfo: "À PROPOS",
        navSocial: "SOCIAL",
        bio: "Bonjour, je suis Winse (winsestar). Je crée des contenus professionnels sur Valorant pour les plateformes TikTok et Instagram. Si vous souhaitez obtenir plus d'informations sur mon travail et mes réseaux sociaux, vous pouvez consulter l'onglet 'Social' dans le menu de gauche."
      }
    };

    let typewriterTimeout;
    function switchLang(lang) {
      if (typewriterTimeout) clearTimeout(typewriterTimeout);
      
      // Persist choice
      localStorage.setItem('winsestar_lang', lang);

      // Toggle active state for all buttons
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('lng' + lang.toUpperCase());
      if (activeBtn) activeBtn.classList.add('active');

      // Update Titles
      document.getElementById('tr-title1').innerText = TRANSLATIONS[lang].title1;
      document.getElementById('tr-title2').innerText = TRANSLATIONS[lang].title2;

      // Update Nav Labels
      const navLabels = document.querySelectorAll('.nav-label');
      if (navLabels.length >= 3) {
        navLabels[0].innerText = TRANSLATIONS[lang].navHome;
        navLabels[1].innerText = TRANSLATIONS[lang].navInfo;
        navLabels[2].innerText = TRANSLATIONS[lang].navSocial;
      }

      // Re-type bio
      const el = document.getElementById('typewriterText');
      if (el) {
        el.innerHTML = "";
        let i = 0;
        const text = TRANSLATIONS[lang].bio;

        function typeWriter() {
          if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            typewriterTimeout = setTimeout(typeWriter, 40);
          }
        }
        typeWriter();
      }
    }

    // Typewriter Effect (Initial with Persistence)
    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('winsestar_lang') || 'tr';
      switchLang(savedLang);
    });

    // Advanced WebGL style Warp & Shooting Stars Canvas (Optimized)
    const canvas = document.getElementById('warpCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    let stars = [];
    const NUM_STARS = window.innerWidth < 768 ? 50 : 100;
    for (let i = 0; i < NUM_STARS; i++) {
      stars.push({ x: Math.random() * w - w / 2, y: Math.random() * h - h / 2, z: Math.random() * w });
    }

    let meteors = [];
    function spawnMeteor() {
      if (Math.random() > 0.98) {
        meteors.push({
          x: Math.random() * w,
          y: -50,
          length: Math.random() * 100 + 100,
          speedX: (Math.random() - 0.5) * 5,
          speedY: Math.random() * 20 + 20,
          opacity: 1
        });
      }
    }

    let lastDraw = 0;
    function draw(timestamp) {
      requestAnimationFrame(draw);
      if (timestamp - lastDraw < 16) return;
      lastDraw = timestamp;

      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, w, h);

      ctx.translate(w / 2, h / 2);
      ctx.beginPath();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      for (let i = 0; i < stars.length; i++) {
        let s = stars[i];
        s.z -= 4;
        if (s.z <= 0) { s.z = w; s.x = Math.random() * w - w / 2; s.y = Math.random() * h - h / 2; }
        let x = (s.x / s.z) * w, y = (s.y / s.z) * h, r = 1.2 * (w / s.z);
        if (r > 6) r = 6;
        ctx.rect(x - r/2, y - r/2, r, r);
      }
      ctx.fill();
      ctx.translate(-w / 2, -h / 2);

      spawnMeteor();
      for (let i = meteors.length - 1; i >= 0; i--) {
        let m = meteors[i];
        m.x += m.speedX;
        m.y += m.speedY;
        m.opacity -= 0.015;

        if (m.opacity <= 0) {
          meteors.splice(i, 1);
          continue;
        }

        ctx.beginPath();
        const gradient = ctx.createLinearGradient(m.x, m.y, m.x - m.speedX * 3, m.y - m.speedY * 3);
        gradient.addColorStop(0, `rgba(255, 255, 255, ${m.opacity})`);
        gradient.addColorStop(1, 'rgba(0, 242, 254, 0)');
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 3;
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - (m.speedX * Math.random() * 5), m.y - (m.length));
        ctx.stroke();
      }
    }
    requestAnimationFrame(draw);
    window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

    // Cursor Glow (Optimized)
    const cg = document.createElement('div');
    cg.style.cssText = 'position:fixed; width:200px; height:200px; background:radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%); border-radius:50%; pointer-events:none; z-index:99; mix-blend-mode:screen; transform:translate(-50%,-50%); left:-500px; top:-500px; will-change: transform, left, top;';
    document.body.appendChild(cg);

    let cursorX = -500;
    let cursorY = -500;
    let isMoving = false;

    document.addEventListener('mousemove', e => {
      cursorX = e.clientX;
      cursorY = e.clientY;
      if (!isMoving) {
        isMoving = true;
        requestAnimationFrame(() => {
          cg.style.left = cursorX + 'px';
          cg.style.top = cursorY + 'px';
          isMoving = false;
        });
      }
    }, { passive: true });
  </script>

  <script src="engine_v8_adapter.js"></script>
</body>

</html>
