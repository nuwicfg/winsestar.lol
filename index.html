    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="engine_v8_adapter.js"></script>
    <script>
      // Warp Speed Yellow Stars
      const canvas = document.getElementById('warpCanvas');
      const ctx = canvas.getContext('2d');
      let w = canvas.width = window.innerWidth;
      let h = canvas.height = window.innerHeight;
      let stars = [];
      for (let i = 0; i < 300; i++) {
        stars.push({ x: Math.random() * w - w / 2, y: Math.random() * h - h / 2, z: Math.random() * w });
      }
      function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(0, 0, w, h);
        ctx.translate(w / 2, h / 2);
        for (let i = 0; i < stars.length; i++) {
          let s = stars[i];
          s.z -= 3;
          if (s.z <= 0) { s.z = w; s.x = Math.random() * w - w / 2; s.y = Math.random() * h - h / 2; }
          let x = (s.x / s.z) * w, y = (s.y / s.z) * h, r = 1.2 * (w / s.z);
          if (r > 10) r = 10;
          ctx.beginPath();
          ctx.fillStyle = '#ffffff';
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.translate(-w / 2, -h / 2);
        requestAnimationFrame(draw);
      }
      draw();
      window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

      // Cursor Glow
      const cg = document.createElement('div');
      cg.style.cssText = 'position:fixed; width:200px; height:200px; background:radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%); border-radius:50%; pointer-events:none; z-index:9999; mix-blend-mode:screen; transform:translate(-50%,-50%); left:-500px; top:-500px;';
      document.body.appendChild(cg);
      document.addEventListener('mousemove', e => {
        cg.style.left = e.clientX + 'px';
        cg.style.top = e.clientY + 'px';
      });

      // Global Translations Engine for Home
      const TRANSLATIONS = {
        tr: {
          navHome: "ANA SAYFA", navInfo: "KİMDİR?", navSocial: "BAĞLANTILAR",
          bio: '<span class="blink-text" style="color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1);">MR</span> <span style="color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1);">🤍</span>',
          views: "Görüntülenme"
        },
        en: {
          navHome: "HOME", navInfo: "ABOUT", navSocial: "SOCIALS",
          bio: '<span class="blink-text" style="color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1);">MR</span> <span style="color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1);">🤍</span>',
          views: "Views"
        },
        de: {
          navHome: "START", navInfo: "ÜBER", navSocial: "LINKS",
          bio: '<span class="blink-text" style="color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1);">HERR</span> <span style="color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1);">🤍</span>',
          views: "Aufrufe"
        },
        fr: {
          navHome: "ACCUEIL", navInfo: "À PROPOS", navSocial: "SOCIALS",
          bio: '<span class="blink-text" style="color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1);">MR</span> <span style="color: #fff; text-shadow: 0 0 15px rgba(255,255,255,1);">🤍</span>',
          views: "Vues"
        }
      };

      function switchLang(lang) {
        localStorage.setItem('winsestar_lang', lang);
        document.querySelectorAll('.lang-btn-v7').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById('lng' + lang.toUpperCase());
        if(activeBtn) activeBtn.classList.add('active');

        // Update Nav
        const navLabels = document.querySelectorAll('.nav-label');
        if(navLabels.length >= 3) {
          navLabels[0].innerText = TRANSLATIONS[lang].navHome;
          navLabels[1].innerText = TRANSLATIONS[lang].navInfo;
          navLabels[2].innerText = TRANSLATIONS[lang].navSocial;
        }

        // Update Bio
        document.getElementById('profileBio').innerHTML = TRANSLATIONS[lang].bio;

        // Update View Count Text (Keep the number, change the label)
        const vText = document.getElementById('viewCountText');
        if(vText) {
          const count = vText.innerText.split(' ')[0];
          vText.innerText = `${count} ${TRANSLATIONS[lang].views}`;
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('winsestar_lang') || 'tr';
        switchLang(savedLang);

        // Fade in on load
        document.body.style.opacity = '0';
        setTimeout(() => {
          document.body.style.transition = 'opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
          document.body.style.opacity = '1';
        }, 100);

        // Intercept Info Button for smooth exit
        const infoBtn = document.getElementById('infoBtn');
        if (infoBtn) {
          infoBtn.addEventListener('click', (e) => {
            e.preventDefault();
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'info.html'; }, 500);
          });
        }

        // Fullscreen Logic
        const fsBtn = document.getElementById('fullscreenToggle');
        if (fsBtn) {
          fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen();
              fsBtn.querySelector('i').classList.replace('fa-expand', 'fa-compress');
            } else {
              if (document.exitFullscreen) {
                document.exitFullscreen();
                fsBtn.querySelector('i').classList.replace('fa-compress', 'fa-expand');
              }
            }
          });
        }
      });
    </script>
