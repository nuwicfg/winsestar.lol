  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <script>
    // Global Translations Engine for Portfolio
    const TRANSLATIONS = {
      tr: {
        navHome: "ANA SAYFA", navInfo: "KİMDİR?", navSocial: "BAĞLANTILAR", navPortfolio: "EDİTLERİM",
        pageTitle: "EDİTLERİM"
      },
      en: {
        navHome: "HOME", navInfo: "ABOUT", navSocial: "SOCIALS", navPortfolio: "EDITS",
        pageTitle: "EDITS"
      },
      de: {
        navHome: "START", navInfo: "ÜBER", navSocial: "LINKS", navPortfolio: "EDITS",
        pageTitle: "EDITS"
      },
      fr: {
        navHome: "ACCUEIL", navInfo: "À PROPOS", navSocial: "SOCIALS", navPortfolio: "EDITS",
        pageTitle: "EDITS"
      }
    };

    function updateLanguage(lang) {
      const navLabels = document.querySelectorAll('.nav-label');
      if (navLabels.length >= 4) {
        navLabels[0].innerText = TRANSLATIONS[lang].navHome;
        navLabels[1].innerText = TRANSLATIONS[lang].navInfo;
        navLabels[2].innerText = TRANSLATIONS[lang].navSocial;
        navLabels[3].innerText = TRANSLATIONS[lang].navPortfolio;
      }
      const titleEl = document.querySelector('.portfolio-title');
      if (titleEl) titleEl.innerText = TRANSLATIONS[lang].pageTitle;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const lang = localStorage.getItem('winsestar_lang') || 'tr';
      updateLanguage(lang);
    });

    // Warp Speed Background
    const canvas = document.getElementById('warpCanvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      let w = canvas.width = window.innerWidth;
      let h = canvas.height = window.innerHeight;
      let stars = [];
      for (let i = 0; i < 300; i++) {
        stars.push({ x: Math.random() * w - w / 2, y: Math.random() * h - h / 2, z: Math.random() * w });
      }
      function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(0, 0, w, h);
        ctx.translate(w / 2, h / 2);
        for (let i = 0; i < stars.length; i++) {
          let s = stars[i];
          s.z -= 3;
          if (s.z <= 0) { s.z = w; s.x = Math.random() * w - w / 2; s.y = Math.random() * h - h / 2; }
          let x = (s.x / s.z) * w, y = (s.y / s.z) * h, r = 1.2 * (w / s.z);
          if (r > 10) r = 10;
          ctx.beginPath();
          ctx.fillStyle = '#ffffff';
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.translate(-w / 2, -h / 2);
        requestAnimationFrame(draw);
      }
      draw();
      window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });
    }
  </script>
</body>
