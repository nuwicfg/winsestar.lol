<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">

  <!-- Essential Sovereign CSS -->

  <style>
    body.sovereign-master {
      background: #000;
      position: relative;
      overflow-y: auto !important;
      /* Portfolio necessitates scrolling */
      height: auto !important;
      min-height: 100vh;
      display: block !important;
    }

    .portfolio-page-wrapper {
      position: relative;
      z-index: 10;
      padding-top: 100px;
      padding-bottom: 60px;
    }

    .portfolio-footer-cta {
      text-align: center;
      margin-top: 40px;
      padding-bottom: 100px;
      animation: cardEntrance 1.5s var(--ease-v7) backwards;
    }

    .cta-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 4px;
      margin-bottom: 25px;
      text-transform: uppercase;
    }

    .tiktok-btn-v7 {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 18px 45px;
      border-radius: 100px;
      color: #fff;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      letter-spacing: 3px;
      transition: all 0.5s var(--ease-v7);
      backdrop-filter: blur(15px);
      text-transform: uppercase;
    }

    .tiktok-btn-v7:hover {
      background: #fff;
      color: #000;
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 20px 50px rgba(255, 255, 255, 0.2);
      border-color: #fff;
    }

    .tiktok-btn-v7 i {
      font-size: 1.5rem;
    }
  </style>
</head>

<body class="sovereign-master">

  <!-- 3D ZOOMING STARS BG -->

    style="position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events: none; opacity: 0.6;"></canvas>

  <!-- TOP NAVIGATION (Relocated from side) -->
  <nav class="top-nav-v7">

    <a href="info.html" class="nav-item">

  <div class="portfolio-page-wrapper">

      <h1 class="portfolio-title">EDİTLERİM</h1>

      <!-- TikTok Card 1 -->

      <!-- TikTok Card 2 -->

          allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>

      <!-- TikTok Card 3 -->

          allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>

      <!-- TikTok Card 4 -->

    <!-- Devamı için CTA Section -->

      <p class="cta-text" id="ctaText">DAHA FAZLASI İÇİN</p>
      <a href="https://tiktok.com/@winsevlr" target="_blank" class="tiktok-btn-v7" id="ctaBtn">

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="engine_v8_adapter.js"></script>
  <script>
    // Global Translations Engine for Portfolio
    const TRANSLATIONS = {
      tr: {
        navHome: "ANA SAYFA", navInfo: "KİMDİR?", navSocial: "BAĞLANTILAR", navPortfolio: "EDİTLERİM",
        pageTitle: "EDİTLERİM", ctaText: "DAHA FAZLASI İÇİN", ctaBtn: "TİKTOK PROFİLİ"
      },
      en: {
        navHome: "HOME", navInfo: "ABOUT", navSocial: "SOCIALS", navPortfolio: "EDITS",
        pageTitle: "EDITS", ctaText: "FOR MORE", ctaBtn: "TIKTOK PROFILE"
      },
      de: {
        navHome: "START", navInfo: "ÜBER", navSocial: "LINKS", navPortfolio: "EDITS",
        pageTitle: "EDITS", ctaText: "FÜR MEHR", ctaBtn: "TIKTOK PROFIL"
      },
      fr: {
        navHome: "ACCUEIL", navInfo: "À PROPOS", navSocial: "SOCIALS", navPortfolio: "EDITS",
        pageTitle: "EDITS", ctaText: "POUR PLUS", ctaBtn: "PROFIL TIKTOK"
      }
    };

    function updateLanguage(lang) {
      const navLabels = document.querySelectorAll('.nav-label');
      if (navLabels.length >= 4) {
        navLabels[0].innerText = TRANSLATIONS[lang].navHome;
        navLabels[1].innerText = TRANSLATIONS[lang].navInfo;
        navLabels[2].innerText = TRANSLATIONS[lang].navSocial;
        navLabels[3].innerText = TRANSLATIONS[lang].navPortfolio;
      }
      const titleEl = document.querySelector('.portfolio-title');
      if (titleEl) titleEl.innerText = TRANSLATIONS[lang].pageTitle;

      // Update CTA
      const ctaTextEl = document.getElementById('ctaText');
      const ctaBtnEl = document.getElementById('ctaBtn');
      if (ctaTextEl) ctaTextEl.innerText = TRANSLATIONS[lang].ctaText;
      if (ctaBtnEl) ctaBtnEl.querySelector('span').innerText = TRANSLATIONS[lang].ctaBtn;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const lang = localStorage.getItem('winsestar_lang') || 'tr';
      updateLanguage(lang);
    });

    // Warp Speed Background
    const canvas = document.getElementById('warpCanvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      let w = canvas.width = window.innerWidth;
      let h = canvas.height = window.innerHeight;
      let stars = [];
      for (let i = 0; i < 300; i++) {
        stars.push({ x: Math.random() * w - w / 2, y: Math.random() * h - h / 2, z: Math.random() * w });
      }
      function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(0, 0, w, h);
        ctx.translate(w / 2, h / 2);
        for (let i = 0; i < stars.length; i++) {
          let s = stars[i];
          s.z -= 3;
          if (s.z <= 0) { s.z = w; s.x = Math.random() * w - w / 2; s.y = Math.random() * h - h / 2; }
          let x = (s.x / s.z) * w, y = (s.y / s.z) * h, r = 1.2 * (w / s.z);
          if (r > 10) r = 10;
          ctx.beginPath();
          ctx.fillStyle = '#ffffff';
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.translate(-w / 2, -h / 2);
        requestAnimationFrame(draw);
      }
      draw();
      window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });
    }
  </script>
</body>

</html>
