    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.body.style.opacity = '1'; }, 100);
            
            const pageLinks = document.querySelectorAll('.page-link');
            pageLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = e.currentTarget.href;
                    document.body.style.opacity = '0';
                    document.body.style.transform = 'scale(0.97)';
                    setTimeout(() => { window.location.href = target; }, 500);
                });
            });
        });

        // Warp & Shooting Stars Canvas
        const canvas = document.getElementById('warpCanvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        let stars = [];
        for(let i=0; i<400; i++) { stars.push({ x: Math.random()*w-w/2, y: Math.random()*h-h/2, z: Math.random()*w }); }
        let meteors = [];
        function spawnMeteor() {
            if (Math.random() > 0.95) {
                meteors.push({ x: Math.random() * w, y: -50, length: Math.random() * 100 + 100, speedX: (Math.random() - 0.5) * 5, speedY: Math.random() * 20 + 20, opacity: 1 });
            }
        }
        function draw() {
          ctx.fillStyle = 'rgba(0,0,0,0.3)';
          ctx.fillRect(0,0,w,h);
          ctx.translate(w/2, h/2);
          for(let i=0; i<stars.length; i++) {
            let s = stars[i];
            s.z -= 4; 
            if (s.z <= 0) { s.z = w; s.x = Math.random()*w-w/2; s.y = Math.random()*h-h/2; }
            let x = (s.x / s.z) * w, y = (s.y / s.z) * h, r = 1.2 * (w / s.z);
            if(r>10) r=10;
            ctx.beginPath();
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.translate(-w/2, -h/2);
          spawnMeteor();
          for(let i=meteors.length-1; i>=0; i--) {
              let m = meteors[i];
              m.x += m.speedX; m.y += m.speedY; m.opacity -= 0.015;
              if (m.opacity <= 0) { meteors.splice(i, 1); continue; }
              ctx.beginPath();
              const gradient = ctx.createLinearGradient(m.x, m.y, m.x - m.speedX*3, m.y - m.speedY*3);
              gradient.addColorStop(0, `rgba(255, 255, 255, ${m.opacity})`);
              gradient.addColorStop(1, 'rgba(0, 242, 254, 0)');
              ctx.strokeStyle = gradient; ctx.lineWidth = 3;
              ctx.moveTo(m.x, m.y); ctx.lineTo(m.x - (m.speedX * Math.random() * 5), m.y - (m.length)); ctx.stroke();
          }
          requestAnimationFrame(draw);
        }
        draw();
        window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });
    </script>
