<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winsestar | Sosyal Medya</title>
  <link rel="icon" type="image/png" href="logo.png?v=2">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #050505;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bg-valorant {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://media.valorant-api.com/agents/8e253930-4c05-31dd-1b6c-968525494517/background.png') no-repeat center center;
      background-size: cover;
      opacity: 0.15;
      z-index: -2;
      pointer-events: none;
    }



    /* Side Nav Capsule (Modern Left Sidebar) */
    .side-nav {
      position: fixed;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(15, 15, 15, 0.4);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      padding: 12px;
      z-index: 1000;
      gap: 15px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }

    .nav-item {
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 1.2rem;
      border-radius: 50%;
      text-decoration: none;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }

    .nav-item:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-item.active {
      background: #ffffff;
      color: #000000;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
      transform: scale(1.1);
    }

    .nav-label {
      position: absolute;
      left: 75px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 6px 15px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-item:hover .nav-label {
      opacity: 1;
      left: 85px;
    }

    .hero-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    .title-line-1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 3.5rem;
      background: linear-gradient(to right, #ffffff, #666666);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1px;
      margin-bottom: 50px;
    }

    /* Advanced Square Social Media App Cards */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      width: 100%;
      max-width: 500px;
      padding-bottom: 50px;
    }

    .app-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #fff;
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
      /* Kare yapar */
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .app-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.05), transparent);
      transform: skewX(-20deg);
      transition: 0.5s;
    }

    .app-card:hover::before {
      left: 150%;
    }

    .app-card:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 50px rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 25px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .app-name {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 2px;
      font-family: 'Montserrat', sans-serif;
      text-align: center;
    }

    .glow-matrix {
      z-index: 5;
    }

    /* Language Switcher for Social */
    .action-btns-social {
      position: fixed;
      top: 30px;
      right: 30px;
      z-index: 1001;
      display: flex;
      gap: 15px;
    }

    .lang-switch-v7 {
      display: flex;
      background: rgba(15, 15, 15, 0.4);
      backdrop-filter: blur(15px);
      padding: 6px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .lang-btn-v7 {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0.4;
      filter: grayscale(1);
    }

    .lang-btn-v7:hover {
      opacity: 0.8;
      background: rgba(255, 255, 255, 0.05);
    }

    .lang-btn-v7.active {
      opacity: 1;
      filter: grayscale(0);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      transform: scale(1.1);
    }

    /* Mobile Optimization for Social */
    @media (max-width: 768px) {
      .side-nav {
        left: 50% !important;
        top: auto !important;
        bottom: 25px !important;
        transform: translateX(-50%) !important;
        flex-direction: row !important;
        padding: 12px 25px !important;
        border-radius: 40px !important;
        width: auto !important;
        background: rgba(10, 10, 10, 0.8) !important;
        backdrop-filter: blur(20px) !important;
        z-index: 1000;
      }

      .nav-item {
        width: 45px !important;
        height: 45px !important;
        font-size: 1.1rem !important;
      }

      .nav-label {
        display: none !important;
      }

      .action-btns-social {
        top: 25px !important;
        right: 50% !important;
        transform: translateX(50%) scale(0.9) !important;
        width: max-content;
      }

      .app-grid {
        grid-template-columns: 1fr;
        gap: 15px;
        max-width: 85%;
        margin: 0 auto;
      }

      .title-line-1 {
        font-size: 2.2rem;
        text-align: center;
        margin-top: 40px;
        margin-bottom: 25px;
      }

      .hero-section {
        padding-top: 80px;
        padding-bottom: 120px;
        justify-content: flex-start;
      }

      .app-card {
        padding: 15px;
        aspect-ratio: auto;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.05);
      }

      .app-icon {
        margin-bottom: 12px;
        width: 55px;
        height: 55px;
        font-size: 1.8rem;
        border-radius: 18px;
      }

      .nav-item.active {
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.8); /* Sharper white halo for mobile */
      }
      
      .bg-valorant {
        background-position: top center;
        opacity: 0.1;
      }
    }
  </style>
</head>

<body>

  <script>
    // Global Translations Engine for Social
    const TRANSLATIONS = {
      tr: {
        navHome: "ANA SAYFA", navInfo: "KİMDİR?", navSocial: "BAĞLANTILAR",
        pageTitle: "BAĞLANTILAR", openLink: "BAĞLANTIYI AÇ"
      },
      en: {
        navHome: "HOME", navInfo: "ABOUT", navSocial: "SOCIALS",
        pageTitle: "SOCIAL LINKS", openLink: "OPEN LINK"
      },
      de: {
        navHome: "START", navInfo: "ÜBER", navSocial: "LINKS",
        pageTitle: "SOZIALE LINKS", openLink: "LINK ÖFFNEN"
      },
      fr: {
        navHome: "ACCUEIL", navInfo: "À PROPOS", navSocial: "SOCIAL",
        pageTitle: "LIENS SOCIAUX", openLink: "OUVRIR LE LIEN"
      }
    };

    function switchLang(lang) {
      localStorage.setItem('winsestar_lang', lang);
      document.querySelectorAll('.lang-btn-v7').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('lng' + lang.toUpperCase());
      if (activeBtn) activeBtn.classList.add('active');

      // Update Nav
      const navLabels = document.querySelectorAll('.nav-label');
      if (navLabels.length >= 3) {
        navLabels[0].innerText = TRANSLATIONS[lang].navHome;
        navLabels[1].innerText = TRANSLATIONS[lang].navInfo;
        navLabels[2].innerText = TRANSLATIONS[lang].navSocial;
      }

      // Update Title
      const titleEl = document.querySelector('.title-line-1');
      if (titleEl) titleEl.innerText = TRANSLATIONS[lang].pageTitle;

      // Update Action Buttons
      const linkBtns = document.querySelectorAll('.app-card > div:last-child');
      linkBtns.forEach(btn => {
        btn.innerText = TRANSLATIONS[lang].openLink;
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('winsestar_lang') || 'tr';
      switchLang(savedLang);
    });

    // Warp & Shooting Stars Canvas (Optimized)
    const canvas = document.getElementById('warpCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    let stars = [];
    const NUM_STARS = window.innerWidth < 768 ? 50 : 100;
    for (let i = 0; i < NUM_STARS; i++) { stars.push({ x: Math.random() * w - w / 2, y: Math.random() * h - h / 2, z: Math.random() * w }); }
    let meteors = [];
    function spawnMeteor() {
      // Throttle meteor spawn based on screen size
      if (Math.random() > 0.98) {
        meteors.push({ x: Math.random() * w, y: -50, length: Math.random() * 100 + 100, speedX: (Math.random() - 0.5) * 5, speedY: Math.random() * 20 + 20, opacity: 1 });
      }
    }

    let lastDraw = 0;
    function draw(timestamp) {
      requestAnimationFrame(draw);
      if (timestamp - lastDraw < 16) return;
      lastDraw = timestamp;

      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, w, h);
      ctx.translate(w / 2, h / 2);

      ctx.beginPath();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      for (let i = 0; i < stars.length; i++) {
        let s = stars[i];
        s.z -= 4;
        if (s.z <= 0) { s.z = w; s.x = Math.random() * w - w / 2; s.y = Math.random() * h - h / 2; }
        let x = (s.x / s.z) * w, y = (s.y / s.z) * h, r = 1.2 * (w / s.z);
        if (r > 6) r = 6;
        ctx.rect(x - r / 2, y - r / 2, r, r);
      }
      ctx.fill();
      ctx.translate(-w / 2, -h / 2);

      spawnMeteor();
      for (let i = meteors.length - 1; i >= 0; i--) {
        let m = meteors[i];
        m.x += m.speedX; m.y += m.speedY; m.opacity -= 0.015;
        if (m.opacity <= 0) { meteors.splice(i, 1); continue; }
        ctx.beginPath();
        const gradient = ctx.createLinearGradient(m.x, m.y, m.x - m.speedX * 3, m.y - m.speedY * 3);
        gradient.addColorStop(0, `rgba(255, 255, 255, ${m.opacity})`);
        gradient.addColorStop(1, 'rgba(0, 242, 254, 0)');
        ctx.strokeStyle = gradient; ctx.lineWidth = 3;
        ctx.moveTo(m.x, m.y); ctx.lineTo(m.x - (m.speedX * Math.random() * 5), m.y - (m.length)); ctx.stroke();
      }
    }
    requestAnimationFrame(draw);
    window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });
  </script>

  <script src="engine_v8_adapter.js"></script>
</body>
